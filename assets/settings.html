<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'; script-src 'unsafe-inline';" />
<title>OpenClaw Settings</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --border: #2d3748;
    --accent: #4a9eff;
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --danger: #f85149;
    --success: #3fb950;
    --input-bg: #0d1117;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-size: 13px;
    line-height: 1.5;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    padding: 0 12px;
    flex-shrink: 0;
  }

  .tab-btn {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 13px;
    padding: 10px 14px;
    transition: color .15s, border-color .15s;
  }

  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── Tab panels ── */
  .tab-panel { display: none; flex: 1; overflow-y: auto; padding: 16px; }
  .tab-panel.active { display: block; }

  /* ── Form elements ── */
  .field { margin-bottom: 14px; }

  label {
    display: block;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  label .required {
    color: var(--danger);
    margin-left: 2px;
  }

  .input-row {
    display: flex;
    gap: 4px;
  }

  input[type="text"],
  input[type="password"],
  input[type="number"] {
    flex: 1;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    padding: 6px 10px;
    outline: none;
    transition: border-color .15s;
  }

  input[type="text"]:focus,
  input[type="password"]:focus,
  input[type="number"]:focus {
    border-color: var(--accent);
  }

  input[type="number"] { width: 100px; flex: none; }

  .show-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 11px;
    padding: 0 10px;
    white-space: nowrap;
  }

  .show-btn:hover { color: var(--text); }

  /* ── Section headings ── */
  .section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--text-dim);
    margin-bottom: 12px;
    margin-top: 4px;
  }

  /* ── Channel toggles ── */
  .channel-block { margin-bottom: 16px; }

  .channel-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .channel-name {
    font-weight: 500;
  }

  /* toggle switch */
  .toggle {
    position: relative;
    width: 36px;
    height: 20px;
    flex-shrink: 0;
  }

  .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }

  .toggle-track {
    position: absolute;
    inset: 0;
    background: var(--border);
    border-radius: 20px;
    cursor: pointer;
    transition: background .15s;
  }

  .toggle input:checked + .toggle-track { background: var(--accent); }

  .toggle-track::after {
    content: "";
    position: absolute;
    top: 3px;
    left: 3px;
    width: 14px;
    height: 14px;
    background: #fff;
    border-radius: 50%;
    transition: transform .15s;
  }

  .toggle input:checked + .toggle-track::after { transform: translateX(16px); }

  .channel-tokens { padding-left: 44px; }
  .channel-tokens.hidden { display: none; }

  /* ── Footer ── */
  .footer {
    border-top: 1px solid var(--border);
    background: var(--surface);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .btn {
    background: var(--accent);
    border: none;
    border-radius: 6px;
    color: #fff;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    padding: 7px 18px;
    transition: opacity .15s;
  }

  .btn:hover { opacity: .85; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  .btn-secondary {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
  }

  .status-msg {
    font-size: 12px;
    color: var(--success);
    flex: 1;
  }

  /* ── Restart banner ── */
  #restart-banner {
    display: none;
    background: #2d2a00;
    border: 1px solid #6e6010;
    border-radius: 6px;
    color: #e3c800;
    font-size: 12px;
    margin: 0 16px 0 16px;
    padding: 8px 12px;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  #restart-banner.visible {
    display: flex;
  }

  #restart-banner .banner-msg { flex: 1; }

  .btn-warn {
    background: #6e6010;
    border: none;
    border-radius: 5px;
    color: #e3c800;
    cursor: pointer;
    font-size: 12px;
    padding: 4px 12px;
    white-space: nowrap;
  }

  .btn-warn:hover { background: #9a880f; }

  /* ── General tab ── */
  .open-folder-btn {
    margin-top: 6px;
  }

  hr.divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 16px 0;
  }
</style>
</head>
<body>

<!-- Tab bar -->
<div class="tabs">
  <button class="tab-btn active" data-tab="api-keys">API Keys</button>
  <button class="tab-btn" data-tab="channels">Channels &amp; Tokens</button>
  <button class="tab-btn" data-tab="general">General</button>
</div>

<!-- ── API Keys tab ── -->
<div class="tab-panel active" id="tab-api-keys">
  <div class="section-title">AI Providers</div>

  <div class="field">
    <label>Anthropic API Key <span class="required">*</span></label>
    <div class="input-row">
      <input type="password" id="ANTHROPIC_API_KEY" placeholder="sk-ant-…" autocomplete="off" />
      <button class="show-btn" data-target="ANTHROPIC_API_KEY">Show</button>
    </div>
  </div>

  <div class="field">
    <label>OpenAI API Key</label>
    <div class="input-row">
      <input type="password" id="OPENAI_API_KEY" placeholder="sk-…" autocomplete="off" />
      <button class="show-btn" data-target="OPENAI_API_KEY">Show</button>
    </div>
  </div>

  <div class="field">
    <label>Gemini API Key</label>
    <div class="input-row">
      <input type="password" id="GEMINI_API_KEY" placeholder="AIza…" autocomplete="off" />
      <button class="show-btn" data-target="GEMINI_API_KEY">Show</button>
    </div>
  </div>

  <div class="field">
    <label>OpenRouter API Key</label>
    <div class="input-row">
      <input type="password" id="OPENROUTER_API_KEY" placeholder="sk-or-…" autocomplete="off" />
      <button class="show-btn" data-target="OPENROUTER_API_KEY">Show</button>
    </div>
  </div>
</div>

<!-- ── Channels & Tokens tab ── -->
<div class="tab-panel" id="tab-channels">
  <div class="section-title">Messaging Channels</div>

  <!-- Telegram -->
  <div class="channel-block">
    <div class="channel-header">
      <label class="toggle">
        <input type="checkbox" id="ch-telegram" />
        <span class="toggle-track"></span>
      </label>
      <span class="channel-name">Telegram</span>
    </div>
    <div class="channel-tokens" id="tokens-telegram">
      <div class="field">
        <label>Bot Token</label>
        <div class="input-row">
          <input type="password" id="TELEGRAM_BOT_TOKEN" placeholder="123456:ABC…" autocomplete="off" />
          <button class="show-btn" data-target="TELEGRAM_BOT_TOKEN">Show</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Discord -->
  <div class="channel-block">
    <div class="channel-header">
      <label class="toggle">
        <input type="checkbox" id="ch-discord" />
        <span class="toggle-track"></span>
      </label>
      <span class="channel-name">Discord</span>
    </div>
    <div class="channel-tokens" id="tokens-discord">
      <div class="field">
        <label>Bot Token</label>
        <div class="input-row">
          <input type="password" id="DISCORD_BOT_TOKEN" placeholder="MTI…" autocomplete="off" />
          <button class="show-btn" data-target="DISCORD_BOT_TOKEN">Show</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Slack -->
  <div class="channel-block">
    <div class="channel-header">
      <label class="toggle">
        <input type="checkbox" id="ch-slack" />
        <span class="toggle-track"></span>
      </label>
      <span class="channel-name">Slack</span>
    </div>
    <div class="channel-tokens" id="tokens-slack">
      <div class="field">
        <label>Bot Token</label>
        <div class="input-row">
          <input type="password" id="SLACK_BOT_TOKEN" placeholder="xoxb-…" autocomplete="off" />
          <button class="show-btn" data-target="SLACK_BOT_TOKEN">Show</button>
        </div>
      </div>
      <div class="field">
        <label>App Token</label>
        <div class="input-row">
          <input type="password" id="SLACK_APP_TOKEN" placeholder="xapp-…" autocomplete="off" />
          <button class="show-btn" data-target="SLACK_APP_TOKEN">Show</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ── General tab ── -->
<div class="tab-panel" id="tab-general">
  <div class="section-title">Gateway</div>

  <div class="field">
    <label>Gateway Port</label>
    <input type="number" id="gateway-port" min="1024" max="65535" value="18789" />
  </div>

  <hr class="divider" />

  <div class="section-title">Config Files</div>
  <p style="color:var(--text-dim);font-size:12px;margin-bottom:10px;">
    Configuration is stored in <code style="background:var(--input-bg);padding:1px 5px;border-radius:3px;">%APPDATA%\openclaw\</code>
  </p>
  <button class="btn btn-secondary open-folder-btn" id="open-config-folder">Open Config Folder</button>
</div>

<!-- Restart banner (between tabs and footer) -->
<div id="restart-banner">
  <span class="banner-msg">&#x2714; Settings saved. Restart the gateway to apply changes.</span>
  <button class="btn-warn" id="restart-now-btn">Restart Now</button>
</div>

<!-- Footer -->
<div class="footer">
  <button class="btn" id="save-btn">Save Settings</button>
  <span class="status-msg" id="status-msg"></span>
</div>

<script>
(function () {
  // ── Tab switching ──────────────────────────────────────────────────────────
  document.querySelectorAll('.tab-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var tabId = btn.getAttribute('data-tab');
      document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
      document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
      btn.classList.add('active');
      document.getElementById('tab-' + tabId).classList.add('active');
    });
  });

  // ── Show/hide password toggles ────────────────────────────────────────────
  document.querySelectorAll('.show-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var targetId = btn.getAttribute('data-target');
      var input = document.getElementById(targetId);
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = 'Hide';
      } else {
        input.type = 'password';
        btn.textContent = 'Show';
      }
    });
  });

  // ── Channel toggles ────────────────────────────────────────────────────────
  var channelMap = {
    'ch-telegram': 'tokens-telegram',
    'ch-discord':  'tokens-discord',
    'ch-slack':    'tokens-slack',
  };

  Object.keys(channelMap).forEach(function(checkId) {
    var tokensId = channelMap[checkId];
    var checkbox = document.getElementById(checkId);
    var tokens   = document.getElementById(tokensId);

    function syncVisibility() {
      if (checkbox.checked) {
        tokens.classList.remove('hidden');
      } else {
        tokens.classList.add('hidden');
      }
    }

    checkbox.addEventListener('change', syncVisibility);
    // initialise hidden
    tokens.classList.add('hidden');
  });

  // ── Load config ────────────────────────────────────────────────────────────
  var oc = window.openclaw;

  function setVal(id, value) {
    var el = document.getElementById(id);
    if (el) el.value = value || '';
  }

  function getVal(id) {
    var el = document.getElementById(id);
    return el ? el.value.trim() : '';
  }

  function populate(config) {
    var env  = config.env  || {};
    var json = config.json || {};

    setVal('ANTHROPIC_API_KEY',  env.ANTHROPIC_API_KEY);
    setVal('OPENAI_API_KEY',     env.OPENAI_API_KEY);
    setVal('GEMINI_API_KEY',     env.GEMINI_API_KEY);
    setVal('OPENROUTER_API_KEY', env.OPENROUTER_API_KEY);

    setVal('TELEGRAM_BOT_TOKEN', env.TELEGRAM_BOT_TOKEN);
    setVal('DISCORD_BOT_TOKEN',  env.DISCORD_BOT_TOKEN);
    setVal('SLACK_BOT_TOKEN',    env.SLACK_BOT_TOKEN);
    setVal('SLACK_APP_TOKEN',    env.SLACK_APP_TOKEN);

    var channels = json.channels || {};
    setChannelEnabled('ch-telegram', 'tokens-telegram',
      channels.telegram ? channels.telegram.enabled : false);
    setChannelEnabled('ch-discord',  'tokens-discord',
      channels.discord  ? channels.discord.enabled  : false);
    setChannelEnabled('ch-slack',    'tokens-slack',
      channels.slack    ? channels.slack.enabled    : false);

    var gw = json.gateway || {};
    setVal('gateway-port', gw.port != null ? String(gw.port) : '18789');
  }

  function setChannelEnabled(checkId, tokensId, enabled) {
    var checkbox = document.getElementById(checkId);
    var tokens   = document.getElementById(tokensId);
    checkbox.checked = enabled;
    if (enabled) {
      tokens.classList.remove('hidden');
    } else {
      tokens.classList.add('hidden');
    }
  }

  oc.readConfig().then(function(config) {
    populate(config);
  }).catch(function(err) {
    console.error('Failed to read config:', err);
  });

  // ── Save ───────────────────────────────────────────────────────────────────
  var saveBtn   = document.getElementById('save-btn');
  var statusMsg = document.getElementById('status-msg');
  var banner    = document.getElementById('restart-banner');

  saveBtn.addEventListener('click', function() {
    saveBtn.disabled = true;
    statusMsg.textContent = '';

    var port = parseInt(getVal('gateway-port'), 10);
    if (isNaN(port) || port < 1024 || port > 65535) {
      statusMsg.style.color = 'var(--danger)';
      statusMsg.textContent = 'Invalid port (must be 1024–65535).';
      saveBtn.disabled = false;
      return;
    }

    // Read existing json first so we can preserve fields like auth.token
    oc.readConfig().then(function(existing) {
      var existingJson = existing.json || {};
      var existingGw   = existingJson.gateway || {};

      var config = {
        env: {
          ANTHROPIC_API_KEY:  getVal('ANTHROPIC_API_KEY')  || undefined,
          OPENAI_API_KEY:     getVal('OPENAI_API_KEY')     || undefined,
          GEMINI_API_KEY:     getVal('GEMINI_API_KEY')     || undefined,
          OPENROUTER_API_KEY: getVal('OPENROUTER_API_KEY') || undefined,
          TELEGRAM_BOT_TOKEN: getVal('TELEGRAM_BOT_TOKEN') || undefined,
          DISCORD_BOT_TOKEN:  getVal('DISCORD_BOT_TOKEN')  || undefined,
          SLACK_BOT_TOKEN:    getVal('SLACK_BOT_TOKEN')    || undefined,
          SLACK_APP_TOKEN:    getVal('SLACK_APP_TOKEN')    || undefined,
        },
        json: {
          gateway: Object.assign({}, existingGw, { port: port }),
          channels: {
            telegram: { enabled: document.getElementById('ch-telegram').checked },
            discord:  { enabled: document.getElementById('ch-discord').checked  },
            slack:    { enabled: document.getElementById('ch-slack').checked    },
          },
        },
      };

      return oc.writeConfig(config);
    }).then(function() {
      statusMsg.style.color = 'var(--success)';
      statusMsg.textContent = 'Saved.';
      banner.classList.add('visible');
      saveBtn.disabled = false;
    }).catch(function(err) {
      statusMsg.style.color = 'var(--danger)';
      statusMsg.textContent = 'Error: ' + (err && err.message ? err.message : String(err));
      saveBtn.disabled = false;
    });
  });

  // ── Restart Now ───────────────────────────────────────────────────────────
  document.getElementById('restart-now-btn').addEventListener('click', function() {
    banner.classList.remove('visible');
    oc.restartGateway().catch(function(err) {
      console.error('Restart failed:', err);
    });
  });

  // ── Open config folder ────────────────────────────────────────────────────
  document.getElementById('open-config-folder').addEventListener('click', function() {
    var appdata = '%APPDATA%';
    // We use the IPC bridge to open the path safely
    oc.openItem(appdata + '\\openclaw').catch(function(err) {
      console.error('openItem failed:', err);
    });
  });
})();
</script>
</body>
</html>
